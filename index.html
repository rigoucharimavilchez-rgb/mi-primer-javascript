<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zombie Shooter - Top Down</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    overflow: hidden;
  }
  canvas {
    display: block;
    margin: 0 auto;
  }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script>

// ==============================
// CONFIGURACIÓN GLOBAL
// ==============================
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: '#2d2d2d',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 0 },
      debug: false
    }
  },
  scene: {
    preload: preload,
    create: create,
    update: update
  }
};

// Variables globales de la escena
let player;
let wasdKeys;
let bullets;
let zombies;
let restartKey;

let healthText;
let scoreText;
let gameOverText;

// Estado del juego
let playerHealth = 3;
const MAX_HEALTH = 3;
let score = 0;
let isGameOver = false;
let zombieSpawnTimer;

// Ajustes de gameplay (fáciles de tunear más adelante)
const PLAYER_SPEED = 250;
const BULLET_SPEED = 700;

// --- Escopeta ---
const SHOTGUN_PELLETS = 4;          // balas por disparo
const SHOTGUN_SPREAD_DEG = 22;      // ángulo total del abanico
const FIRE_COOLDOWN = 500;          // ms entre disparos

// --- Zombies comunes ---
const ZOMBIE_SPEED = 90;
const ZOMBIE_SPAWN_MIN = 2000;      // ms
const ZOMBIE_SPAWN_MAX = 3000;      // ms
const ZOMBIE_HIT_COOLDOWN = 800;    // ms de invulnerabilidad tras recibir daño de contacto

// --- Probabilidades de spawn especial (deben sumar <= 100) ---
const TANK_SPAWN_CHANCE = 10;   // %
const BOOMER_SPAWN_CHANCE = 15; // %

// --- Tamaños visuales objetivo (en píxeles de pantalla) ---
// Como las imágenes externas no tienen todas el mismo tamaño nativo,
// forzamos un tamaño de display consistente para cada tipo.
const PLAYER_DISPLAY_SIZE = 40;
const ZOMBIE_COMMON_DISPLAY_SIZE = 34;
const ZOMBIE_TANK_DISPLAY_SIZE = 68;   // el doble que el común
const ZOMBIE_BOOMER_DISPLAY_SIZE = 34;
const BULLET_DISPLAY_SIZE = 10;

// --- Definición de tipos de zombie ---
const ZOMBIE_TYPES = {
  common: {
    key: 'zombie_common',
    displaySize: ZOMBIE_COMMON_DISPLAY_SIZE,
    speed: ZOMBIE_SPEED,
    health: 1,
    score: 10,
    explosive: false
  },
  tank: {
    key: 'zombie_tank',
    displaySize: ZOMBIE_TANK_DISPLAY_SIZE,
    speed: Math.round(ZOMBIE_SPEED * 0.6), // 40% más lento
    health: 5,
    score: 50,
    explosive: false
  },
  boomer: {
    key: 'zombie_boomer', // sigue siendo una textura generada (ver nota más abajo)
    displaySize: ZOMBIE_BOOMER_DISPLAY_SIZE,
    speed: ZOMBIE_SPEED,
    health: 1,
    score: 30,
    explosive: true
  }
};

const EXPLOSION_RADIUS = 70;
const EXPLOSION_DURATION = 500; // ms

let lastFired = 0;
let lastHitTime = 0;

const game = new Phaser.Game(config);

// ==============================
// PRELOAD
// ==============================
function preload() {
  // ----- Imágenes externas reales (sprites PNG) -----
  // Nota: usamos assets públicos del propio CDN oficial de ejemplos de Phaser
  // porque 'https://phaser.io' es la web del framework, no un archivo de imagen,
  // y cargarla como textura fallaría. Cuando tengas tu propio arte, simplemente
  // reemplaza estas URLs por las tuyas (por ejemplo, imágenes .png subidas a tu
  // propio repo de GitHub y servidas vía raw.githubusercontent.com).
  this.load.image('player', 'https://labs.phaser.io/assets/sprites/phaser-dude.png');
  this.load.image('zombie_common', 'https://cdn.phaserfiles.com/v355/src/games/firstgame/assets/bomb.png');
  this.load.image('zombie_tank', 'https://labs.phaser.io/assets/sprites/red_ball.png');
  this.load.image('bullet', 'https://cdn.phaserfiles.com/v355/src/games/firstgame/assets/star.png');

  // ----- Boomer: se mantiene como textura generada -----
  // No se especificó una imagen externa para el Boomer, así que seguimos
  // generándola con Graphics (círculo morado) para que conserve su identidad
  // visual distintiva. Puedes cargar una imagen real para él más adelante
  // con la misma técnica que las demás.
  const boomerGfx = this.make.graphics({ x: 0, y: 0, add: false });
  boomerGfx.fillStyle(0x8e44ad, 1);
  boomerGfx.fillCircle(16, 16, 16);
  boomerGfx.lineStyle(3, 0x3d1a4a, 1);
  boomerGfx.strokeCircle(16, 16, 16);
  boomerGfx.generateTexture('zombie_boomer', 32, 32);
  boomerGfx.destroy();
}

// ==============================
// CREATE
// ==============================
function create() {
  // Reset de estado (útil al reiniciar la escena)
  playerHealth = MAX_HEALTH;
  score = 0;
  isGameOver = false;
  lastFired = 0;
  lastHitTime = 0;

  // ----- Jugador -----
  player = this.physics.add.sprite(400, 300, 'player');
  player.setCollideWorldBounds(true);
  player.setDrag(600, 600);
  player.setMaxVelocity(PLAYER_SPEED);
  fitCircleBody(player, PLAYER_DISPLAY_SIZE);

  // ----- Grupo de balas -----
  bullets = this.physics.add.group({
    defaultKey: 'bullet',
    maxSize: 150 // más balas en el pool porque la escopeta dispara varias a la vez
  });

  // ----- Grupo de zombies -----
  zombies = this.physics.add.group();

  // ----- Input teclado (WASD) -----
  wasdKeys = this.input.keyboard.addKeys({
    up: Phaser.Input.Keyboard.KeyCodes.W,
    down: Phaser.Input.Keyboard.KeyCodes.S,
    left: Phaser.Input.Keyboard.KeyCodes.A,
    right: Phaser.Input.Keyboard.KeyCodes.D
  });

  restartKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);

  // ----- Input ratón: disparo con clic izquierdo -----
  this.input.on('pointerdown', (p) => {
    if (p.leftButtonDown() && !isGameOver) {
      shoot(this);
    }
  });

  // ----- HUD -----
  healthText = this.add.text(16, 16, '', {
    fontSize: '20px',
    fontFamily: 'Arial',
    color: '#ffffff'
  }).setScrollFactor(0).setDepth(10);

  scoreText = this.add.text(16, 44, '', {
    fontSize: '20px',
    fontFamily: 'Arial',
    color: '#ffffff'
  }).setScrollFactor(0).setDepth(10);

  updateHealthText();
  updateScoreText();

  gameOverText = this.add.text(400, 300, '', {
    fontSize: '40px',
    fontFamily: 'Arial',
    color: '#ff3333',
    align: 'center'
  }).setOrigin(0.5).setDepth(20).setVisible(false);

  // ----- Colisiones -----
  // Bala vs Zombie: la bala desaparece, el zombie recibe daño (y puede explotar si es Boomer)
  this.physics.add.overlap(bullets, zombies, onBulletHitsZombie, null, this);

  // Zombie vs Jugador: resta vida (o detona si es Boomer)
  this.physics.add.overlap(player, zombies, onZombieHitsPlayer, null, this);

  // ----- Spawner de zombies -----
  scheduleNextZombie(this);
}

// ==============================
// UPDATE (loop principal)
// ==============================
function update(time, delta) {
  if (isGameOver) {
    if (Phaser.Input.Keyboard.JustDown(restartKey)) {
      restartGame(this);
    }
    return;
  }

  handleMovement();
  handleRotation();
  handleZombieAI();
  cleanupBullets();
}

// ------------------------------
// Ajusta el tamaño visual de un sprite y sincroniza su cuerpo físico
// circular para que coincida con el tamaño que se ve en pantalla.
// Esto es necesario porque las imágenes externas no vienen todas del
// mismo tamaño nativo en píxeles.
// ------------------------------
function fitCircleBody(sprite, displayDiameter) {
  sprite.setDisplaySize(displayDiameter, displayDiameter);

  // setCircle() espera un radio en el espacio "sin escalar" del frame;
  // Phaser lo multiplica internamente por la escala actual del sprite.
  const radius = (displayDiameter / 2) / sprite.scaleX;
  sprite.body.setCircle(radius);
  sprite.body.setOffset(
    (sprite.width - radius * 2) / 2,
    (sprite.height - radius * 2) / 2
  );
}

// ------------------------------
// Movimiento del jugador (8 direcciones)
// ------------------------------
function handleMovement() {
  const moveVector = new Phaser.Math.Vector2(0, 0);

  if (wasdKeys.left.isDown)  moveVector.x -= 1;
  if (wasdKeys.right.isDown) moveVector.x += 1;
  if (wasdKeys.up.isDown)    moveVector.y -= 1;
  if (wasdKeys.down.isDown)  moveVector.y += 1;

  if (moveVector.length() > 0) {
    moveVector.normalize();
    player.setVelocity(moveVector.x * PLAYER_SPEED, moveVector.y * PLAYER_SPEED);
  } else {
    player.setVelocity(0, 0);
  }
}

// ------------------------------
// Rotación del jugador hacia el cursor
// ------------------------------
function handleRotation() {
  const p = player.scene.input.activePointer;
  const worldPoint = p.positionToCamera(player.scene.cameras.main);

  const angle = Phaser.Math.Angle.Between(
    player.x, player.y,
    worldPoint.x, worldPoint.y
  );

  player.rotation = angle;
}

// ------------------------------
// Disparo (ESCOPETA: varias balas en abanico)
// ------------------------------
function shoot(scene) {
  const now = scene.time.now;
  if (now < lastFired + FIRE_COOLDOWN) return;
  lastFired = now;

  const baseAngle = player.rotation;
  const spreadRad = Phaser.Math.DegToRad(SHOTGUN_SPREAD_DEG);

  const angleStep = SHOTGUN_PELLETS > 1 ? spreadRad / (SHOTGUN_PELLETS - 1) : 0;
  const startAngle = baseAngle - spreadRad / 2;

  for (let i = 0; i < SHOTGUN_PELLETS; i++) {
    const pelletAngle = SHOTGUN_PELLETS > 1 ? startAngle + angleStep * i : baseAngle;
    fireBullet(scene, pelletAngle);
  }
}

// ------------------------------
// Crea (o reutiliza del pool) una única bala en un ángulo dado
// ------------------------------
function fireBullet(scene, angle) {
  const bullet = bullets.get(player.x, player.y);
  if (!bullet) return; // pool lleno

  bullet.setActive(true);
  bullet.setVisible(true);
  if (bullet.body) {
    bullet.body.enable = true;
  }

  bullet.setPosition(player.x, player.y);
  fitCircleBody(bullet, BULLET_DISPLAY_SIZE);

  scene.physics.velocityFromRotation(angle, BULLET_SPEED, bullet.body.velocity);

  bullet.lifespan = 1500;
  bullet.spawnTime = scene.time.now;
}

// ------------------------------
// Limpieza de balas fuera de pantalla o caducadas
// ------------------------------
function cleanupBullets() {
  bullets.children.each((bullet) => {
    if (!bullet.active) return;

    const outOfBounds =
      bullet.x < -20 || bullet.x > 820 ||
      bullet.y < -20 || bullet.y > 620;

    const expired = (game.loop.time - bullet.spawnTime) > bullet.lifespan;

    if (outOfBounds || expired) {
      deactivateBullet(bullet);
    }
  });
}

function deactivateBullet(bullet) {
  bullet.setActive(false);
  bullet.setVisible(false);
  if (bullet.body) {
    bullet.body.stop();
    bullet.body.enable = false;
  }
}

// ==============================
// ZOMBIES
// ==============================

// ------------------------------
// Programa el siguiente spawn de zombie (entre 2 y 3 segundos)
// ------------------------------
function scheduleNextZombie(scene) {
  const delay = Phaser.Math.Between(ZOMBIE_SPAWN_MIN, ZOMBIE_SPAWN_MAX);
  zombieSpawnTimer = scene.time.addEvent({
    delay: delay,
    callback: () => {
      if (!isGameOver) {
        spawnZombie(scene);
      }
      scheduleNextZombie(scene);
    }
  });
}

// ------------------------------
// Decide aleatoriamente qué tipo de zombie toca spawnear
// (10% Tank, 15% Boomer, 75% común)
// ------------------------------
function rollZombieType() {
  const roll = Phaser.Math.Between(1, 100);

  if (roll <= TANK_SPAWN_CHANCE) {
    return 'tank';
  }
  if (roll <= TANK_SPAWN_CHANCE + BOOMER_SPAWN_CHANCE) {
    return 'boomer';
  }
  return 'common';
}

// ------------------------------
// Crea un zombie fuera de la pantalla en un borde aleatorio
// ------------------------------
function spawnZombie(scene) {
  const side = Phaser.Math.Between(0, 3); // 0=arriba, 1=abajo, 2=izquierda, 3=derecha
  let x, y;
  const margin = 70; // margen amplio para que quepa el Tank sin verse recortado

  switch (side) {
    case 0: // arriba
      x = Phaser.Math.Between(0, 800);
      y = -margin;
      break;
    case 1: // abajo
      x = Phaser.Math.Between(0, 800);
      y = 600 + margin;
      break;
    case 2: // izquierda
      x = -margin;
      y = Phaser.Math.Between(0, 600);
      break;
    case 3: // derecha
      x = 800 + margin;
      y = Phaser.Math.Between(0, 600);
      break;
  }

  const typeName = rollZombieType();
  const typeData = ZOMBIE_TYPES[typeName];

  const zombie = scene.physics.add.sprite(x, y, typeData.key);
  zombies.add(zombie);
  zombie.setCollideWorldBounds(false);
  fitCircleBody(zombie, typeData.displaySize);

  // Guardamos toda la info de gameplay en el propio objeto (data manager de Phaser)
  zombie.setData('type', typeName);
  zombie.setData('speed', typeData.speed);
  zombie.setData('health', typeData.health);
  zombie.setData('scoreValue', typeData.score);
  zombie.setData('explosive', typeData.explosive);
}

// ------------------------------
// IA: cada zombie se mueve directamente hacia el jugador
// ------------------------------
function handleZombieAI() {
  zombies.children.each((zombie) => {
    if (!zombie.active) return;

    const speed = zombie.getData('speed');
    player.scene.physics.moveToObject(zombie, player, speed);

    const angle = Phaser.Math.Angle.Between(zombie.x, zombie.y, player.x, player.y);
    zombie.rotation = angle;
  });
}

// ==============================
// COLISIONES
// ==============================

// ------------------------------
// Bala impacta zombie -> la bala desaparece y el zombie recibe daño.
// Si su vida llega a 0, muere (y si es Boomer, explota).
// ------------------------------
function onBulletHitsZombie(bullet, zombie) {
  if (!bullet.active || !zombie.active) return;

  deactivateBullet(bullet);

  const remainingHealth = zombie.getData('health') - 1;
  zombie.setData('health', remainingHealth);

  // Pequeño feedback visual de impacto (parpadeo), útil sobre todo en el Tank
  zombie.setTintFill(0xffffff);
  zombie.scene.time.delayedCall(80, () => {
    if (zombie.active) zombie.clearTint();
  });

  if (remainingHealth <= 0) {
    killZombie(zombie);
  }
}

// ------------------------------
// Zombie toca al jugador.
// Los Boomer detonan al contacto en vez de hacer daño de golpe normal.
// ------------------------------
function onZombieHitsPlayer(playerObj, zombie) {
  if (!zombie.active) return;

  const scene = playerObj.scene;

  if (zombie.getData('explosive')) {
    const x = zombie.x;
    const y = zombie.y;
    zombies.remove(zombie, true, true);
    triggerExplosion(scene, x, y);
    return;
  }

  const now = scene.time.now;
  if (now < lastHitTime + ZOMBIE_HIT_COOLDOWN) return;
  lastHitTime = now;

  zombie.destroy();
  damagePlayer(scene, 1);
}

// ------------------------------
// Elimina un zombie ya sin vida, otorga puntos y dispara su explosión si aplica
// ------------------------------
function killZombie(zombie) {
  const scene = zombie.scene;
  const wasExplosive = zombie.getData('explosive');
  const x = zombie.x;
  const y = zombie.y;
  const points = zombie.getData('scoreValue');

  zombies.remove(zombie, true, true);

  addScore(points);

  if (wasExplosive) {
    triggerExplosion(scene, x, y);
  }
}

// ==============================
// EXPLOSIÓN DEL BOOMER
// ==============================
function triggerExplosion(scene, x, y) {
  const explosionGfx = scene.add.circle(x, y, 10, 0x9dff00, 0.6);
  explosionGfx.setDepth(15);

  scene.tweens.add({
    targets: explosionGfx,
    radius: EXPLOSION_RADIUS,
    alpha: 0,
    duration: EXPLOSION_DURATION,
    ease: 'Cubic.Out',
    onUpdate: (tween, target) => {
      explosionGfx.setRadius(target.radius);
    },
    onComplete: () => {
      explosionGfx.destroy();
    }
  });

  if (!isGameOver) {
    const distance = Phaser.Math.Distance.Between(x, y, player.x, player.y);
    if (distance <= EXPLOSION_RADIUS) {
      damagePlayer(scene, 1);
    }
  }
}

// ==============================
// DAÑO AL JUGADOR / VIDA
// ==============================
function damagePlayer(scene, amount) {
  if (isGameOver) return;

  playerHealth -= amount;
  updateHealthText();

  if (playerHealth <= 0) {
    triggerGameOver(scene);
  }
}

// ==============================
// PUNTUACIÓN
// ==============================
function addScore(points) {
  score += points;
  updateScoreText();
}

function updateScoreText() {
  scoreText.setText('Puntos: ' + score);
}

// ==============================
// HUD / VIDA
// ==============================
function updateHealthText() {
  const hearts = '❤️'.repeat(Math.max(playerHealth, 0)) + '🖤'.repeat(MAX_HEALTH - Math.max(playerHealth, 0));
  healthText.setText('Vida: ' + hearts);
}

// ==============================
// GAME OVER
// ==============================
function triggerGameOver(scene) {
  isGameOver = true;

  if (zombieSpawnTimer) zombieSpawnTimer.remove(false);

  player.setVelocity(0, 0);
  zombies.children.each((z) => z.setVelocity(0, 0));

  gameOverText.setText('GAME OVER\nPuntuación final: ' + score + '\nPresiona R para reiniciar').setVisible(true);

  scene.physics.pause();
}

// ------------------------------
// Reinicio del juego
// ------------------------------
function restartGame(scene) {
  scene.physics.resume();
  scene.scene.restart();
}

</script>
</body>
</html>
