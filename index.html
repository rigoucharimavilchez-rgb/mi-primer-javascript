<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Apocalipsis Zombie - JS Shooter 🎮</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #333;
            background: radial-gradient(circle, #220000 0%, #050505 100%);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .controles {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 style="color: #ff3333; margin: 5px;">ZOMBIE SHOOTER 🧟‍♂️</h1>
    <canvas id="canvasJuego" width="800" height="500"></canvas>
    <div class="controles">
        Usa las flechas <strong>◄ ►</strong> o <strong>A / D</strong> para moverte. Dispara con la <strong>Barra Espaciadora</strong>.
    </div>

<script>
    const canvas = document.getElementById("canvasJuego");
    const ctx = canvas.getContext("2d");

    // Variables del juego
    let puntuacion = 0;
    let vidas = 3;
    let juegoTerminado = false;

    // Jugador (Sobreviviente)
    const jugador = {
        x: canvas.width / 2 - 20,
        y: canvas.height - 50,
        ancho: 40,
        alto: 40,
        velocidad: 7,
        color: "#00ffcc"
    };

    // Teclas presionadas
    const teclas = {};

    // Listas de objetos
    const balas = [];
    const zombies = [];

    // Temporizador para aparición de zombies
    let tiempoUltimoZombie = 0;
    let intervaloZombie = 1500; // Aparece un zombie cada 1.5 segundos inicialmente

    // Escuchar teclado
    window.addEventListener("keydown", (e) => teclas[e.key] = true);
    window.addEventListener("keyup", (e) => teclas[e.key] = false);

    // Disparar bala
    window.addEventListener("keydown", (e) => {
        if (e.key === " " && !juegoTerminado) { // Barra espaciadora
            balas.push({
                x: jugador.x + jugador.ancho / 2 - 3,
                y: jugador.y,
                ancho: 6,
                alto: 15,
                velocidad: 9,
                color: "#ffff00"
            });
        }
        if (e.key === "r" || e.key === "R") {
            if (juegoTerminado) reiniciarJuego();
        }
    });

    // Generar zombies aleatorios
    function generarZombie(tiempoActual) {
        if (tiempoActual - tiempoUltimoZombie > intervaloZombie) {
            const tamano = Math.random() * (45 - 25) + 25; // Tamaños variados
            zombies.push({
                x: Math.random() * (canvas.width - tamano),
                y: -tamano,
                ancho: tamano,
                alto: tamano,
                velocidad: Math.random() * (3 - 1.2) + 1.2, // Velocidades variadas
                color: "#44ff44"
            });
            tiempoUltimoZombie = tiempoActual;
            
            // Aumentar dificultad poco a poco
            if (intervaloZombie > 500) intervaloZombie -= 20;
        }
    }

    // Comprobar colisión entre dos rectángulos
    function hayColision(r1, r2) {
        return r1.x < r2.x + r2.ancho &&
               r1.x + r1.ancho > r2.x &&
               r1.y < r2.y + r2.alto &&
               r1.y + r1.alto > r2.y;
    }

    // Actualizar lógica del juego
    function actualizar(tiempoActual) {
        if (juegoTerminado) return;

        // Movimiento del jugador
        if ((teclas["ArrowLeft"] || teclas["a"] || teclas["A"]) && jugador.x > 0) {
            jugador.x -= jugador.velocidad;
        }
        if ((teclas["ArrowRight"] || teclas["d"] || teclas["D"]) && jugador.x < canvas.width - jugador.ancho) {
            jugador.x += jugador.velocidad;
        }

        // Mover balas
        for (let i = balas.length - 1; i >= 0; i--) {
            balas[i].y -= balas[i].velocidad;
            if (balas[i].y < 0) {
                balas.splice(i, 1); // Eliminar si sale de pantalla
            }
        }

        // Mover y gestionar zombies
        generarZombie(tiempoActual);
        for (let i = zombies.length - 1; i >= 0; i--) {
            zombies[i].y += zombies[i].velocidad;

            // Zombie llega al suelo (pérdida de vida)
            if (zombies[i].y > canvas.height) {
                zombies.splice(i, 1);
                vidas--;
                if (vidas <= 0) juegoTerminado = true;
                continue;
            }

            // Colisión Zombie con Jugador
            if (hayColision(zombies[i], jugador)) {
                zombies.splice(i, 1);
                vidas--;
                if (vidas <= 0) juegoTerminado = true;
                continue;
            }

            // Colisión Bala con Zombie
            for (let j = balas.length - 1; j >= 0; j--) {
                if (hayColision(balas[j], zombies[i])) {
                    zombies.splice(i, 1);
                    balas.splice(j, 1);
                    puntuacion += 10;
                    break;
                }
            }
        }
    }

    // Dibujar todo en el Canvas
    function dibujar() {
        // Limpiar pantalla
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar jugador (Sobreviviente con un cañón)
        ctx.fillStyle = jugador.color;
        ctx.fillRect(jugador.x, jugador.y, jugador.ancho, jugador.alto);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(jugador.x + jugador.ancho/2 - 5, jugador.y - 10, 10, 10); // Cañón

        // Dibujar balas
        balas.forEach(bala => {
            ctx.fillStyle = bala.color;
            ctx.fillRect(bala.x, bala.y, bala.ancho, bala.alto);
        });

        // Dibujar zombies (Con ojos rojos terroríficos)
        zombies.forEach(zombie => {
            ctx.fillStyle = zombie.color;
            ctx.fillRect(zombie.x, zombie.y, zombie.ancho, zombie.alto);
            
            // Ojos
            ctx.fillStyle = "red";
            ctx.fillRect(zombie.x + 5, zombie.y + 8, 4, 4);
            ctx.fillRect(zombie.x + zombie.ancho - 9, zombie.y + 8, 4, 4);
        });

        // Dibujar interfaz (Marcador y Vidas)
        ctx.fillStyle = "#fff";
        ctx.font = "20px Arial";
        ctx.fillText(`Puntos: ${puntuacion}`, 20, 35);
        
        ctx.fillStyle = "#ff3333";
        ctx.fillText(`Vidas: ${"❤️".repeat(vidas)}`, canvas.width - 160, 35);

        // Pantalla de Game Over
        if (juegoTerminado) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff2222";
            ctx.font = "bold 50px Arial";
            ctx.textAlign = "center";
            ctx.fillText("¡TE HAN COMIDO EL CEREBRO!", canvas.width / 2, canvas.height / 2 - 20);

            ctx.fillStyle = "#ffffff";
            ctx.font = "25px Arial";
            ctx.fillText(`Puntuación Final: ${puntuacion}`, canvas.width / 2, canvas.height / 2 + 30);
            ctx.font = "18px Arial";
            ctx.fillStyle = "#888";
            ctx.fillText("Presiona la tecla 'R' para revivir", canvas.width / 2, canvas.height / 2 + 80);
            ctx.textAlign = "start"; // Resetear alineación
        }
    }

    // Bucle principal del juego
    function bucleJuego(tiempoActual) {
        actualizar(tiempoActual);
        dibujar();
        requestAnimationFrame(bucleJuego);
    }

    // Reiniciar valores
    function reiniciarJuego() {
        puntuacion = 0;
        vidas = 3;
        balas.length = 0;
        zombies.length = 0;
        intervaloZombie = 1500;
        juegoTerminado = false;
        jugador.x = canvas.width / 2 - 20;
    }

    // Arrancar juego por primera vez
    requestAnimationFrame(bucleJuego);
</script>

</body>
</html>
