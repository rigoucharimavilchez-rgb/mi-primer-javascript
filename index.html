<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Mi Primer Juego en JavaScript!</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input { padding: 10px; font-size: 16px; width: 80px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; background-color: #2ea44f; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #2c974b; }
        #mensaje { margin-top: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Adivina el Número Secreto 🎮</h1>
    <p>He pensado un número entre **1** y **100**. ¿Puedes adivinarlo?</p>
    
    <input type="number" id="intento" min="1" max="100">
    <button onclick="comprobarIntento()">Probar</button>

    <p id="mensaje"></p>
</div>

<script>
    // JavaScript genera un número aleatorio entre 1 y 100
    const numeroSecreto = Math.floor(Math.random() * 100) + 1;
    let intentos = 0;

    function comprobarIntento() {
        const cajaTexto = document.getElementById("intento");
        const mensaje = document.getElementById("mensaje");
        const suposicion = parseInt(boxTexto = cajaTexto.value);
        intentos++;

        if (isNaN(suposicion) || suposicion < 1 || suposicion > 100) {
            mensaje.innerText = "❌ Por favor, introduce un número válido entre 1 y 100.";
            mensaje.style.color = "red";
            return;
        }

        if (suposicion === numeroSecreto) {
            mensaje.innerText = `🎉 ¡Felicidades! Adivinaste el número en ${intentos} intentos.`;
            mensaje.style.color = "green";
        } else if (suposicion < numeroSecreto) {
            mensaje.innerText = "📈 ¡Más alto! Intenta otra vez.";
            mensaje.style.color = "orange";
        } else {
            mensaje.innerText = "📉 ¡Más bajo! Intenta otra vez.";
            mensaje.style.color = "orange";
        }
    }
</script>

</body>
</html>
