<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zombie Shooter - Top Down</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    overflow: hidden;
  }
  canvas {
    display: block;
    margin: 0 auto;
  }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script>

// ==============================
// CONFIGURACIÓN GLOBAL
// ==============================
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: '#2d2d2d',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 0 },
      debug: false
    }
  },
  scene: {
    preload: preload,
    create: create,
    update: update
  }
};

// Variables globales
let player;
let wasdKeys;
let bullets;
let zombies;
let restartKey;

let healthText;
let scoreText;
let waveText;
let gameOverText;

// Estado del juego
let playerHealth = 3;
const MAX_HEALTH = 3;
let isGameOver = false;
let zombieSpawnTimer;

// NUEVO: sistema de puntuación
let score = 0;

// NUEVO: dificultad escalable
let currentWave = 1;
let currentZombieSpeed = 90;
let currentSpawnMin = 2000;
let currentSpawnMax = 3000;

// Ajustes base
const PLAYER_SPEED = 250;
const BULLET_SPEED = 700;
const FIRE_COOLDOWN = 150;
const ZOMBIE_HIT_COOLDOWN = 800;

let lastFired = 0;
let lastHitTime = 0;

const game = new Phaser.Game(config);

// ==============================
// PRELOAD
// ==============================
function preload() {

  // Jugador
  const playerGfx = this.make.graphics({ x: 0, y: 0, add: false });
  playerGfx.fillStyle(0x00ff66, 1);
  playerGfx.fillCircle(16, 16, 16);
  playerGfx.fillStyle(0xffffff, 1);
  playerGfx.fillRect(16, 13, 14, 6);
  playerGfx.generateTexture('player', 32, 32);
  playerGfx.destroy();

  // Bala
  const bulletGfx = this.make.graphics({ x: 0, y: 0, add: false });
  bulletGfx.fillStyle(0xffff00, 1);
  bulletGfx.fillCircle(4, 4, 4);
  bulletGfx.generateTexture('bullet', 8, 8);
  bulletGfx.destroy();

  // Zombie
  const zombieGfx = this.make.graphics({ x: 0, y: 0, add: false });
  zombieGfx.fillStyle(0xff0000, 1);
  zombieGfx.fillCircle(14, 14, 14);
  zombieGfx.lineStyle(2, 0x770000, 1);
  zombieGfx.strokeCircle(14, 14, 14);
  zombieGfx.generateTexture('zombie', 28, 28);
  zombieGfx.destroy();
}

// ==============================
// CREATE
// ==============================
function create() {

  // Reset de estado
  playerHealth = MAX_HEALTH;
  isGameOver = false;
  score = 0;

  // Reset de dificultad
  currentWave = 1;
  currentZombieSpeed = 90;
  currentSpawnMin = 2000;
  currentSpawnMax = 3000;

  lastFired = 0;
  lastHitTime = 0;

  // Jugador
  player = this.physics.add.image(400, 300, 'player');
  player.setCollideWorldBounds(true);
  player.setDrag(600, 600);
  player.setMaxVelocity(PLAYER_SPEED);

  // Balas
  bullets = this.physics.add.group({
    defaultKey: 'bullet',
    maxSize: 100
  });

  // Zombies
  zombies = this.physics.add.group();

  // Controles
  wasdKeys = this.input.keyboard.addKeys({
    up: Phaser.Input.Keyboard.KeyCodes.W,
    down: Phaser.Input.Keyboard.KeyCodes.S,
    left: Phaser.Input.Keyboard.KeyCodes.A,
    right: Phaser.Input.Keyboard.KeyCodes.D
  });

  restartKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);

  // Disparo
  this.input.on('pointerdown', (p) => {
    if (p.leftButtonDown() && !isGameOver) {
      shoot(this);
    }
  });

  // ==============================
  // HUD
  // ==============================

  // Vida
  healthText = this.add.text(16, 16, 'Vida: ❤️❤️❤️', {
    fontSize: '20px',
    fontFamily: 'Arial',
    color: '#ffffff'
  }).setScrollFactor(0).setDepth(10);

  // NUEVO: Score debajo de las vidas
  scoreText = this.add.text(16, 46, 'Zombies Eliminados: 0', {
    fontSize: '20px',
    fontFamily: 'Arial',
    color: '#ffff66'
  }).setScrollFactor(0).setDepth(10);

  // NUEVO: Oleada actual
  waveText = this.add.text(16, 76, 'Oleada: 1', {
    fontSize: '18px',
    fontFamily: 'Arial',
    color: '#66ccff'
  }).setScrollFactor(0).setDepth(10);

  // Game Over
  gameOverText = this.add.text(400, 300, '', {
    fontSize: '36px',
    fontFamily: 'Arial',
    color: '#ff3333',
    align: 'center'
  }).setOrigin(0.5).setDepth(20).setVisible(false);

  // Colisiones
  this.physics.add.overlap(bullets, zombies, onBulletHitsZombie, null, this);
  this.physics.add.overlap(player, zombies, onZombieHitsPlayer, null, this);

  // Spawner inicial
  scheduleNextZombie(this);

  // ==============================
  // NUEVO: Dificultad escalable
  // Cada 15 segundos aumenta la intensidad
  // ==============================
  this.time.addEvent({
    delay: 15000,
    loop: true,
    callback: () => {
      if (isGameOver) return;

      currentWave++;

      // Reducir tiempo de spawn (mínimo 500 ms)
      currentSpawnMin = Math.max(500, currentSpawnMin - 250);
      currentSpawnMax = Math.max(800, currentSpawnMax - 250);

      // Aumentar velocidad de zombies
      currentZombieSpeed += 15;

      waveText.setText('Oleada: ' + currentWave);

      console.log(`Oleada ${currentWave} | Spawn: ${currentSpawnMin}-${currentSpawnMax} | Velocidad: ${currentZombieSpeed}`);
    }
  });
}

// ==============================
// UPDATE
// ==============================
function update() {

  if (isGameOver) {
    if (Phaser.Input.Keyboard.JustDown(restartKey)) {
      restartGame(this);
    }
    return;
  }

  handleMovement();
  handleRotation();
  handleZombieAI();
  cleanupBullets();
}

// ==============================
// MOVIMIENTO
// ==============================
function handleMovement() {

  const moveVector = new Phaser.Math.Vector2(0, 0);

  if (wasdKeys.left.isDown)  moveVector.x -= 1;
  if (wasdKeys.right.isDown) moveVector.x += 1;
  if (wasdKeys.up.isDown)    moveVector.y -= 1;
  if (wasdKeys.down.isDown)  moveVector.y += 1;

  if (moveVector.length() > 0) {
    moveVector.normalize();
    player.setVelocity(moveVector.x * PLAYER_SPEED, moveVector.y * PLAYER_SPEED);
  } else {
    player.setVelocity(0, 0);
  }
}

// ==============================
// ROTACIÓN
// ==============================
function handleRotation() {

  const p = player.scene.input.activePointer;
  const worldPoint = p.positionToCamera(player.scene.cameras.main);

  const angle = Phaser.Math.Angle.Between(
    player.x, player.y,
    worldPoint.x, worldPoint.y
  );

  player.rotation = angle;
}

// ==============================
// DISPARO
// ==============================
function shoot(scene) {

  const now = scene.time.now;
  if (now < lastFired + FIRE_COOLDOWN) return;

  lastFired = now;

  const bullet = bullets.get(player.x, player.y);
  if (!bullet) return;

  bullet.setActive(true);
  bullet.setVisible(true);

  if (bullet.body) {
    bullet.body.enable = true;
  }

  bullet.setPosition(player.x, player.y);

  scene.physics.velocityFromRotation(
    player.rotation,
    BULLET_SPEED,
    bullet.body.velocity
  );

  bullet.lifespan = 1500;
  bullet.spawnTime = scene.time.now;
}

// ==============================
// LIMPIEZA DE BALAS
// ==============================
function cleanupBullets() {

  bullets.children.each((bullet) => {

    if (!bullet.active) return;

    const outOfBounds =
      bullet.x < -20 || bullet.x > 820 ||
      bullet.y < -20 || bullet.y > 620;

    const expired = (game.loop.time - bullet.spawnTime) > bullet.lifespan;

    if (outOfBounds || expired) {
      deactivateBullet(bullet);
    }
  });
}

function deactivateBullet(bullet) {

  bullet.setActive(false);
  bullet.setVisible(false);

  if (bullet.body) {
    bullet.body.stop();
    bullet.body.enable = false;
  }
}

// ==============================
// ZOMBIES
// ==============================

// Spawner dinámico
function scheduleNextZombie(scene) {

  const delay = Phaser.Math.Between(currentSpawnMin, currentSpawnMax);

  zombieSpawnTimer = scene.time.addEvent({
    delay: delay,
    callback: () => {

      if (!isGameOver) {
        spawnZombie(scene);
      }

      scheduleNextZombie(scene);
    }
  });
}

// Crear zombie
function spawnZombie(scene) {

  const side = Phaser.Math.Between(0, 3);

  let x, y;
  const margin = 40;

  switch (side) {
    case 0:
      x = Phaser.Math.Between(0, 800);
      y = -margin;
      break;

    case 1:
      x = Phaser.Math.Between(0, 800);
      y = 600 + margin;
      break;

    case 2:
      x = -margin;
      y = Phaser.Math.Between(0, 600);
      break;

    case 3:
      x = 800 + margin;
      y = Phaser.Math.Between(0, 600);
      break;
  }

  const zombie = scene.physics.add.image(x, y, 'zombie');

  // Guardar velocidad actual
  zombie.speed = currentZombieSpeed;

  zombies.add(zombie);
}

// IA
function handleZombieAI() {

  zombies.children.each((zombie) => {

    if (!zombie.active) return;

    player.scene.physics.moveToObject(
      zombie,
      player,
      zombie.speed || currentZombieSpeed
    );

    zombie.rotation = Phaser.Math.Angle.Between(
      zombie.x,
      zombie.y,
      player.x,
      player.y
    );
  });
}

// ==============================
// COLISIONES
// ==============================

// Bala golpea zombie
function onBulletHitsZombie(bullet, zombie) {

  deactivateBullet(bullet);
  zombie.destroy();

  // NUEVO: sumar puntos
  score++;
  scoreText.setText('Zombies Eliminados: ' + score);
}

// Zombie golpea jugador
function onZombieHitsPlayer(playerObj, zombie) {

  const scene = playerObj.scene;
  const now = scene.time.now;

  if (now < lastHitTime + ZOMBIE_HIT_COOLDOWN) return;

  lastHitTime = now;

  zombie.destroy();

  playerHealth--;
  updateHealthText();

  if (playerHealth <= 0) {
    triggerGameOver(scene);
  }
}

// ==============================
// VIDA
// ==============================
function updateHealthText() {

  const hearts =
    '❤️'.repeat(Math.max(playerHealth, 0)) +
    '🖤'.repeat(MAX_HEALTH - Math.max(playerHealth, 0));

  healthText.setText('Vida: ' + hearts);
}

// ==============================
// GAME OVER
// ==============================
function triggerGameOver(scene) {

  isGameOver = true;

  if (zombieSpawnTimer) zombieSpawnTimer.remove(false);

  player.setVelocity(0, 0);

  zombies.children.each((z) => z.setVelocity(0, 0));

  // Mostrar puntuación final
  gameOverText.setText(
    'GAME OVER\n\n' +
    'Zombies eliminados: ' + score + '\n\n' +
    'Presiona R para reiniciar'
  ).setVisible(true);

  scene.physics.pause();
}

// ==============================
// REINICIO
// ==============================
function restartGame(scene) {

  scene.physics.resume();
  scene.scene.restart();
}

</script>
</body>
</html>
